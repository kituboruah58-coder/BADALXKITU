<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate KeyAuth Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .floating-shape {
            position: absolute;
            opacity: 0.05;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.6s ease-out;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 20px;
        }

        .logo {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header h1 {
            color: #333;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 13px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
            color: #333;
        }

        input::placeholder {
            color: #bbb;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
            background-color: #f8f9ff;
        }

        input:valid {
            border-color: #4caf50;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            background: #f44336;
            transition: width 0.3s ease;
        }

        .password-strength-bar.medium {
            width: 50%;
            background: #ff9800;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #4caf50;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .remember-forgot a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            color: #666;
            cursor: pointer;
            font-size: 13px;
        }

        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            margin: 0 15px;
            color: #999;
            font-size: 12px;
            font-weight: 600;
        }

        .social-login {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .social-btn {
            flex: 1;
            padding: 11px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f8f9ff;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status-message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #764ba2;
        }

        .license-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
                max-width: 100%;
                margin: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .tabs {
                flex-direction: column;
            }

            .social-login {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="floating-shape" style="width: 200px; height: 200px; border-radius: 30%; background: #667eea; top: 10%; left: 5%;"></div>
        <div class="floating-shape" style="width: 150px; height: 150px; border-radius: 30%; background: #764ba2; top: 60%; right: 10%; animation-delay: 3s;"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">☁️</div>
            <h1>CLOUD X STREAMER</h1>
            <p>Streamer Dashboard</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="license">License</button>
        </div>

        <!-- LOGIN TAB -->
        <div id="login" class="tab-content active">
            <div class="status-message" id="loginStatus"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="https://discord.gg/Uy3yYT2ETG" target="_blank">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>

        <!-- REGISTER TAB - REMOVED, USE ADMIN PANEL INSTEAD -->

        <!-- LICENSE TAB -->
        <div id="license" class="tab-content">
            <div class="status-message" id="licenseStatus"></div>
            
            <form id="licenseForm">
                <div class="form-group">
                    <label for="license-key">License Key</label>
                    <input type="text" id="license-key" name="license" placeholder="XXXX-XXXX-XXXX-XXXX" required>
                </div>

                <div class="form-group">
                    <label for="license-email">Email Address</label>
                    <input type="email" id="license-email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="license-password">Password</label>
                    <input type="password" id="license-password" name="password" placeholder="Create password for this account" required>
                </div>

                <div class="form-group">
                    <label for="license-confirm">Confirm Password</label>
                    <input type="password" id="license-confirm" name="confirm" placeholder="Re-enter your password" required>
                </div>

                <button type="submit" class="login-btn">Activate & Register</button>
            </form>
        </div>

        <div class="signup-link">
            📧 Contact admin to create your account | 🔑 Or activate with a license key
        </div>
    </div>

    <script>
        const API_ORIGIN = window.location.protocol === 'file:' ? 'http://localhost:5000' : window.location.origin;
        const API_URL = `${API_ORIGIN}/api`;

        // Tab Switching
        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-btn');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`button[data-tab="${tabName}"]`).classList.add('active');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                switchTab(this.dataset.tab);
            });
        });

        // Show Status Message
        function showStatus(elementId, message, type) {
            const statusEl = document.getElementById(elementId);
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 5000);
        }

        // Password Strength Meter - REMOVED (only for admin to create accounts)

        // Device fingerprint helpers (browser-safe HWID approximation)
        function getOrCreateDeviceSeed() {
            const storageKey = 'device_seed_v1';
            let seed = localStorage.getItem(storageKey);
            if (!seed) {
                seed = (crypto.randomUUID ? crypto.randomUUID() : `seed-${Date.now()}-${Math.random().toString(36).slice(2)}`);
                localStorage.setItem(storageKey, seed);
            }
            return seed;
        }

        function getCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(0, 0, 100, 40);
                ctx.fillStyle = '#069';
                ctx.fillText('HWID-Fingerprint', 2, 2);
                return canvas.toDataURL();
            } catch (error) {
                return 'canvas-unavailable';
            }
        }

        function getWebGLFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return 'webgl-unavailable';

                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const vendor = debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : 'vendor-unknown';
                const renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'renderer-unknown';
                const version = gl.getParameter(gl.VERSION) || 'version-unknown';
                return `${vendor}|${renderer}|${version}`;
            } catch (error) {
                return 'webgl-error';
            }
        }

        async function sha256Hex(value) {
            const data = new TextEncoder().encode(value);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(digest))
                .map((byte) => byte.toString(16).padStart(2, '0'))
                .join('')
                .toUpperCase();
        }

        async function getHWID() {
            const fingerprintData = [
                getOrCreateDeviceSeed(),
                navigator.userAgent || 'ua-unknown',
                navigator.platform || 'platform-unknown',
                navigator.language || 'lang-unknown',
                (navigator.languages || []).join(','),
                navigator.hardwareConcurrency || 'cpu-unknown',
                navigator.deviceMemory || 'mem-unknown',
                screen.width,
                screen.height,
                screen.colorDepth,
                window.devicePixelRatio || 1,
                Intl.DateTimeFormat().resolvedOptions().timeZone || 'tz-unknown',
                getCanvasFingerprint(),
                getWebGLFingerprint()
            ].join('|');

            const hash = await sha256Hex(fingerprintData);
            return `WEB-${hash.slice(0, 32)}`;
        }

        function isValidIp(value) {
            if (!value || typeof value !== 'string') return false;
            const ip = value.trim();
            const ipv4Pattern = /^(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}$/;
            const ipv6Pattern = /^[0-9a-fA-F:]+$/;
            return ipv4Pattern.test(ip) || ipv6Pattern.test(ip);
        }

        function withTimeout(promise, timeoutMs) {
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject(new Error('timeout')), timeoutMs);
                promise
                    .then((result) => {
                        clearTimeout(timeout);
                        resolve(result);
                    })
                    .catch((error) => {
                        clearTimeout(timeout);
                        reject(error);
                    });
            });
        }

        async function getPublicIpHint() {
            const providers = [
                async () => {
                    const response = await fetch('https://api.ipify.org?format=json', { cache: 'no-store' });
                    if (!response.ok) throw new Error('ipify failed');
                    const payload = await response.json();
                    return payload.ip;
                },
                async () => {
                    const response = await fetch('https://ipv4.icanhazip.com', { cache: 'no-store' });
                    if (!response.ok) throw new Error('icanhazip failed');
                    return (await response.text()).trim();
                },
                async () => {
                    const response = await fetch('https://ifconfig.me/ip', { cache: 'no-store' });
                    if (!response.ok) throw new Error('ifconfig failed');
                    return (await response.text()).trim();
                }
            ];

            for (const provider of providers) {
                try {
                    const ip = await withTimeout(provider(), 4000);
                    if (isValidIp(ip)) return ip.trim();
                } catch (error) {
                    // Try next provider
                }
            }

            return null;
        }

        // LOGIN FORM
        document.getElementById('loginForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showStatus('loginStatus', '❌ Please fill all fields', 'error');
                return;
            }

            showStatus('loginStatus', '⏳ Authenticating...', 'info');
            
            try {
                const [hwid, clientIp] = await Promise.all([getHWID(), getPublicIpHint()]);

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, hwid, clientIp })
                });

                const data = await response.json();

if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showStatus('loginStatus', '✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    let errorMsg = data.error || 'Login failed';
                    if (errorMsg.includes('Streamer tier')) {
                        errorMsg += ' <a href="https://discord.gg/G54H6hpfrc" target="_blank" style="color: #667eea; font-weight: bold;">Join Discord</a>';
                    }
                    showStatus('loginStatus', `❌ ${errorMsg}`, 'error');
                }
            } catch (error) {
                showStatus('loginStatus', '❌ Connection error', 'error');
                console.error(error);
            }
        });

        // REGISTER FORM - REMOVED, USE ADMIN PANEL

        // LICENSE FORM
        document.getElementById('licenseForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const license = document.getElementById('license-key').value;
            const email = document.getElementById('license-email').value;
            const password = document.getElementById('license-password').value;
            const confirm = document.getElementById('license-confirm').value;

            if (!license || !email || !password || !confirm) {
                showStatus('licenseStatus', '❌ Please fill all fields', 'error');
                return;
            }

            if (password !== confirm) {
                showStatus('licenseStatus', '❌ Passwords do not match', 'error');
                return;
            }

            if (!/^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(license)) {
                showStatus('licenseStatus', '❌ Invalid license key format', 'error');
                return;
            }

            showStatus('licenseStatus', '⏳ Validating license key...', 'info');
            
            try {
                const [hwid, clientIp] = await Promise.all([getHWID(), getPublicIpHint()]);

                const response = await fetch(`${API_URL}/auth/license`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ license, email, password, confirm, hwid, clientIp })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showStatus('licenseStatus', '✅ License activated! Account created!', 'success');
                    document.getElementById('licenseForm').reset();
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    showStatus('licenseStatus', `❌ ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('licenseStatus', '❌ Connection error', 'error');
                console.error(error);
            }
        });

        // Social Login - REMOVED
    </script>
</body>
</html>
